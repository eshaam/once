events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Upstream to the health check service
    upstream healthcheck_service {
        server healthcheck:3001;
    }

    # HTTP server - redirect to HTTPS
    server {
        listen 80;
        server_name _;

        # Health check endpoints (proxy to service for JSON response)
        location /up {
            proxy_pass http://healthcheck_service/up;
        }

        location /health {
            proxy_pass http://healthcheck_service/health;
        }

        # Redirect other requests to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL certificates
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Serve static files from /app directory
        root /app;
        index index.html;

        # Health check endpoints - proxy to health check service for JSON format
        location /up {
            proxy_pass http://healthcheck_service/up;
        }

        location /health {
            proxy_pass http://healthcheck_service/health;
        }

        # Serve static files
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Security: Block access to sensitive files
        location ~ /\. {
            deny all;
        }
    }
}
