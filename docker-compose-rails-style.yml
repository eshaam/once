services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.rails-style
    container_name: once-nginx
    ports:
      - "9080:80"
      - "9443:443"
    depends_on:
      - healthcheck
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  healthcheck:
    build:
      context: .
      dockerfile: Dockerfile.healthcheck-simple
    container_name: once-healthcheck
    restart: unless-stopped
    environment:
      - HEALTH_PORT=3001
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s