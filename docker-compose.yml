services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.simple
    container_name: once-nginx
    ports:
      - "9080:80"
      - "9443:443"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
